# ==============================================================================
# Doable — Pre-built production compose (pulls from ghcr.io)
# ==============================================================================
# Same service topology as docker-compose.yml, but `image:` instead of `build:`.
# Use this when you don't want to build from source — `docker compose pull`
# fetches the published images in ~30s instead of a 5-10min multi-stage build.
#
# Quick start:
#   curl -O https://raw.githubusercontent.com/doable-me/doable/main/deployment/docker/docker-compose.prod.yml
#   curl -O https://raw.githubusercontent.com/doable-me/doable/main/deployment/docker/setup.sh
#   chmod +x setup.sh
#   DOMAIN=app.example.com DOABLE_PREBUILT=true ./setup.sh
#
# To pin a specific release instead of `latest`:
#   DOABLE_IMAGE_TAG=v1.2.3 docker compose -f docker-compose.prod.yml up -d
#
# To use the source-build path instead (for development or local forks), use
# docker-compose.yml — same env contract, builds locally.
# ==============================================================================

services:
  # --- PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doable-postgres
    restart: unless-stopped
    # No host port — postgres is reached only over docker internal DNS
    # (`postgres:5432`). Use `docker compose exec postgres psql -U doable`
    # for local debugging.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deployment/docker/.env — run ./deployment/docker/setup.sh to generate}
      POSTGRES_DB: ${POSTGRES_DB:-doable}
      # Password for the runtime-only doable_app role. See docker-compose.yml
      # for the full rationale + 02-roles.sh for what it creates.
      DOABLE_APP_PASSWORD: ${DOABLE_APP_PASSWORD:?Set DOABLE_APP_PASSWORD in deployment/docker/.env — run ./deployment/docker/setup.sh to generate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./02-roles.sh:/docker-entrypoint-initdb.d/02-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doable}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  # --- Run database migrations ---
  migrate:
    image: ghcr.io/doable-me/doable-migrate:${DOABLE_IMAGE_TAG:-latest}
    container_name: doable-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Owner role — DDL only happens here. Runtime api+ws use doable_app.
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-doable}
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- API server (Hono) ---
  api:
    image: ghcr.io/doable-me/doable-api:${DOABLE_IMAGE_TAG:-latest}
    container_name: doable-api
    restart: unless-stopped
    # No host port — api is reached only via Caddy's /api/* reverse proxy
    # and by ws/migrate/web over docker internal DNS (`api:4000`).
    # Healthcheck uses the container's own 127.0.0.1:4000.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      # Runtime-only role (CRUD on public, no DDL). See docker-compose.yml +
      # 02-roles.sh for the role-separation rationale.
      DATABASE_URL: postgres://doable_app:${DOABLE_APP_PASSWORD:?DOABLE_APP_PASSWORD is required — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
      DATABASE_POOL_SIZE: 20
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in deployment/docker/.env}
      JWT_ISSUER: doable
      JWT_ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_TOKEN_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in deployment/docker/.env}
      API_PORT: 4000
      API_HOST: 127.0.0.1
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required — run ./deployment/docker/setup.sh, or set it to the public origin(s) e.g. "https://app.example.com"}
      WS_PORT: 4001
      WS_HOST: 127.0.0.1
      INTERNAL_SECRET: ${INTERNAL_SECRET:?Set INTERNAL_SECRET in deployment/docker/.env}
      WS_INTERNAL_URL: http://ws:4001
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # ─── AI provider env-seed passthrough (see docker-compose.yml for full notes) ─
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # *_REDIRECT_URI vars must reach the api container so lib/oauth.ts
      # builds the auth URL with the Caddy-fronted redirect_uri. Without
      # this passthrough the api falls back to the http://localhost:4000
      # default in lib/oauth.ts, GitHub rejects with "redirect_uri is not
      # associated with this application", and the setup wizard's Copilot
      # Connect button dead-ends on the GitHub authorize page.
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITHUB_COPILOT_REDIRECT_URI: ${GITHUB_COPILOT_REDIRECT_URI:-}
      GITHUB_REPO_REDIRECT_URI: ${GITHUB_REPO_REDIRECT_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NODE_ENV: ${NODE_ENV:-production}
      PROJECTS_ROOT: ./projects
      REDIS_URL: ${REDIS_URL:-}
      DOABLE_KEK: ${DOABLE_KEK:?Set DOABLE_KEK in deployment/docker/.env — openssl rand -base64 32}
      INSTALL_BOOTSTRAP_TOKEN: ${INSTALL_BOOTSTRAP_TOKEN:-}
      INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT: ${INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT:-}
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-}
      # AI subprocess sandbox — see docker-compose.yml for the full rationale
      # on why both env vars must be set in lockstep and why the OOB default
      # is `off` (bwrap's mount() is blocked by Docker's default seccomp).
      DOABLE_HARDENING: ${DOABLE_HARDENING:-off}
      DOABLE_HARDENING_LEVEL: ${DOABLE_HARDENING_LEVEL:-off}
      DOABLE_SANDBOX_INSTALL: ${DOABLE_SANDBOX_INSTALL:-0}
      # Per-app database + AI runtime. ON by default; set DOABLE_APP_DB_ENABLED=0
      # / DOABLE_APP_AI_ENABLED=0 in deployment/docker/.env to disable.
      DOABLE_APP_DB_ENABLED: ${DOABLE_APP_DB_ENABLED:-1}
      DOABLE_APP_AI_ENABLED: ${DOABLE_APP_AI_ENABLED:-1}
    volumes:
      - api_projects:/app/services/api/projects
      - api_thumbnails:/app/services/api/thumbnails
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- WebSocket server (Yjs CRDT) ---
  ws:
    image: ghcr.io/doable-me/doable-ws:${DOABLE_IMAGE_TAG:-latest}
    container_name: doable-ws
    restart: unless-stopped
    # No host port — ws is reached only via Caddy at /ws (browser → caddy
    # → ws:4001) and by api over docker internal DNS. Healthcheck uses
    # the container's own 127.0.0.1:4001.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      # Same runtime role as api. See docker-compose.yml.
      DATABASE_URL: postgres://doable_app:${DOABLE_APP_PASSWORD:?DOABLE_APP_PASSWORD is required — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in deployment/docker/.env}
      WS_PORT: 4001
      WS_HOST: 127.0.0.1
      INTERNAL_SECRET: ${INTERNAL_SECRET:?Set INTERNAL_SECRET in deployment/docker/.env}
      API_URL: http://api:4000
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_URL: ${REDIS_URL:-}
      DOABLE_KEK: ${DOABLE_KEK:?Set DOABLE_KEK in deployment/docker/.env — openssl rand -base64 32}
      # See docker-compose.yml for why this env is needed.
      DOABLE_PROJECTS_DIR: /app/services/ws/projects
    volumes:
      - ws_projects:/app/services/ws/projects
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- Web frontend (Next.js) ---
  web:
    image: ghcr.io/doable-me/doable-web:${DOABLE_IMAGE_TAG:-latest}
    container_name: doable-web
    restart: unless-stopped
    # No host port — web is reached only through Caddy (browser → caddy
    # catch-all → web:3000 via docker internal DNS).
    depends_on:
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
    environment:
      # The web image is built with placeholder URLs in the client bundle;
      # the container's runtime entrypoint sed-replaces them on startup with
      # these values. So unlike docker-compose.yml (build path), here the
      # NEXT_PUBLIC_* vars matter at RUN time, not BUILD time.
      # API_INTERNAL_URL is server-side only — used by Next.js middleware to
      # reach api over the docker network. Without it middleware falls back
      # to NEXT_PUBLIC_API_URL (https://localhost/api) which is unreachable
      # from inside the container and silently breaks the post-signup
      # /setup redirect for the first platform admin (BUG-R34-I).
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- Caddy TLS terminator + reverse proxy ---
  # See docker-compose.yml for full notes — identical service shape, just
  # uses the same `caddy:2-alpine` image (no ghcr-prebuilt variant needed).
  caddy:
    image: caddy:2-alpine
    container_name: doable-caddy
    restart: unless-stopped
    ports:
      - "${DOABLE_BIND_ADDR:-127.0.0.1}:80:80"
      - "${DOABLE_BIND_ADDR:-127.0.0.1}:443:443"
    environment:
      DOABLE_SITE: ${DOABLE_SITE:-localhost}
      DOABLE_TLS: ${DOABLE_TLS:-/certs/cert.pem /certs/key.pem}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
      web:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  postgres_data:
  api_projects:
  api_thumbnails:
  ws_projects:
  caddy_data:
  caddy_config:
