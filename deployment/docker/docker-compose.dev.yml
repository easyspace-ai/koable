# ==============================================================================
# Doable — Docker Compose
# ==============================================================================
# Quick start:
#   cp deployment/docker/.env.example deployment/docker/.env   # then edit secrets
#   docker compose -f deployment/docker/docker-compose.dev.yml up --build
#
# With Redis (optional, for multi-instance scaling):
#   Set REDIS_URL=redis://redis:6379 in deployment/docker/.env
#   docker compose -f deployment/docker/docker-compose.dev.yml --profile redis up --build
#
# DB only:      docker compose -f deployment/docker/docker-compose.dev.yml up postgres
# Rebuild:      docker compose -f deployment/docker/docker-compose.dev.yml up --build
# ==============================================================================

services:
  # --- PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doable-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deployment/docker/.env — run ./deployment/docker/setup.sh to generate}
      POSTGRES_DB: ${POSTGRES_DB:-doable}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doable}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Run database migrations ---
  migrate:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: migrate
    container_name: doable-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deployment/docker/.env — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
    restart: "no"

  # --- API server (Hono) ---
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: api
    container_name: doable-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"  # Host binds to localhost only; 0.0.0.0 inside container is required for Docker networking
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deployment/docker/.env — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
      DATABASE_POOL_SIZE: 20
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in deployment/docker/.env}
      JWT_ISSUER: doable
      JWT_ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_TOKEN_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in deployment/docker/.env}
      API_PORT: 4000
      API_HOST: 0.0.0.0  # Must be 0.0.0.0 inside Docker for container networking; host port is bound to 127.0.0.1
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      WS_PORT: 4001
      WS_HOST: 0.0.0.0  # Must be 0.0.0.0 inside Docker for container networking
      INTERNAL_SECRET: ${INTERNAL_SECRET:?Set INTERNAL_SECRET in deployment/docker/.env}
      WS_INTERNAL_URL: http://ws:4001
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # ─── AI provider env-seed passthrough ─────────────────────────────────
      # Doable supports 50+ providers via the runtime wizard
      # (packages/shared/src/ai/provider-catalog.ts). The vars below are the
      # ones whose values get auto-seeded into platform_config on first boot
      # by services/api/src/lib/seedAiProviderFromEnv.ts so the wizard's AI
      # step shows "configured" without manual entry. Empty by default —
      # operators set whichever of these they want as the install's default
      # provider in deployment/docker/.env. Local providers (Ollama, LM Studio, vLLM, …)
      # are configured at runtime via the wizard, no env var needed.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      # QA-only rate-limit kill switch (services/api/src/middleware/rate-limit.ts:54).
      # Default empty = limits enforced. Set to "true" in deployment/docker/.env ONLY for
      # QA-bench runs on a test box — the rate-limit module fail-loudly warns
      # when this is on with NODE_ENV=production.
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NODE_ENV: ${NODE_ENV:-production}
      PROJECTS_ROOT: ./projects
      REDIS_URL: ${REDIS_URL:-}
      # KEK for envelope encryption of wizard-saved secrets (required)
      DOABLE_KEK: ${DOABLE_KEK:?Set DOABLE_KEK in deployment/docker/.env — openssl rand -base64 32}
      # First-run bootstrap (single-use; setup.sh generates these)
      INSTALL_BOOTSTRAP_TOKEN: ${INSTALL_BOOTSTRAP_TOKEN:-}
      INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT: ${INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT:-}
      # Per-app database + AI runtime. ON by default; set DOABLE_APP_DB_ENABLED=0
      # / DOABLE_APP_AI_ENABLED=0 in deployment/docker/.env to disable.
      DOABLE_APP_DB_ENABLED: ${DOABLE_APP_DB_ENABLED:-1}
      DOABLE_APP_AI_ENABLED: ${DOABLE_APP_AI_ENABLED:-1}
    volumes:
      - api_projects:/app/services/api/projects
      - api_thumbnails:/app/services/api/thumbnails

  # --- WebSocket server (Yjs CRDT) ---
  ws:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: ws
    container_name: doable-ws
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deployment/docker/.env — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in deployment/docker/.env}
      WS_PORT: 4001
      WS_HOST: 0.0.0.0  # Must be 0.0.0.0 inside Docker for container networking; host port is bound to 127.0.0.1
      INTERNAL_SECRET: ${INTERNAL_SECRET:?Set INTERNAL_SECRET in deployment/docker/.env}
      API_URL: http://api:4000
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - ws_projects:/app/services/ws/projects

  # --- Web frontend (Next.js) ---
  web:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: doable-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
      - ws
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HOSTNAME: 0.0.0.0  # Must be 0.0.0.0 inside Docker for container networking; host port is bound to 127.0.0.1
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}

  # --- Redis (optional, enabled with --profile redis) ---
  redis:
    image: redis:7-alpine
    container_name: doable-redis
    profiles: ["redis"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  api_projects:
  api_thumbnails:
  ws_projects:
  redis_data:
