# ==============================================================================
# Secure Docker install — full hardening parity with setup-server.sh.
# Use this for real installs. For 5-min local demos, use the original
# docker-compose.yml in deployment/docker/.
# ==============================================================================
# Quickstart:
#   docker compose -f deployment/docker/docker-compose.secure.yml up -d
#   docker compose -f deployment/docker/docker-compose.secure.yml logs -f doable
# First boot is ~2-3 min — secrets generate, Postgres initialises, deps install,
# migrations run, then setup-server.sh hands off to systemd. Watch for the
# "All services running" line in the logs.
# ==============================================================================

services:
  doable:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.secure
    container_name: doable-secure
    # systemd PID 1 + bubblewrap user namespaces + per-project cgroup
    # delegation all need CAP_SYS_ADMIN. Privileged is required for
    # in-container hardening parity with the bare-metal install.
    privileged: true
    # systemd needs writable /run and /tmp as tmpfs.
    tmpfs:
      - /run
      - /tmp
    volumes:
      # Read-write so systemd can manage cgroups inside the container.
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # All persistent state (Postgres data, generated .env, project trees,
      # published sites, thumbnails) lives in this named volume.
      - doable_data:/var/lib/doable
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:4000:4000"
      - "127.0.0.1:4001:4001"
    restart: unless-stopped
    # First boot does the entire setup-server.sh flow before the API listens —
    # give it 120s before the healthcheck starts probing.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # systemd interprets SIGRTMIN+3 as "shutdown gracefully" on PID 1.
    stop_signal: SIGRTMIN+3
    # Use the host's cgroup namespace so systemd inside the container can
    # delegate cgroups to per-project units.
    cgroup: host
    environment:
      DOABLE_HARDENING: full
      NODE_ENV: production
      # Everything else — JWT_SECRET, ENCRYPTION_KEY, INTERNAL_SECRET,
      # database password, BUILD_HTTP_PROXY, etc. — is generated by
      # setup-server.sh on first boot into /var/lib/doable/.env.

volumes:
  doable_data: {}
