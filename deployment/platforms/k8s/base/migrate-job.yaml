# Optional standalone migration Job.
#
# The DEFAULT migration path uses initContainers inside api-deployment.yaml
# and ws-deployment.yaml (each pod runs migrate before starting the main
# container). That approach is idempotent and self-healing.
#
# This Job is provided for operators who prefer a distinct migration step,
# e.g. with ArgoCD sync waves or explicit `kubectl wait` ordering:
#
#   kubectl apply -f deploy-templates/k8s/base/migrate-job.yaml
#   kubectl wait --for=condition=complete job/migrate -n doable --timeout=300s
#   kubectl apply -k deploy-templates/k8s/base/
#
# If you use this Job, you may remove the initContainers blocks from
# api-deployment.yaml and ws-deployment.yaml to avoid running migrate twice.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: doable
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
      containers:
        - name: migrate
          image: ghcr.io/doable-me/doable-migrate:latest
          envFrom:
            - secretRef:
                name: doable-secrets
