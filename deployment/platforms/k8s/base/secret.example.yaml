# cp secret.example.yaml secret.yaml && edit, then kustomize will fail unless
# secret.yaml is added to kustomization.yaml resources — see README.md.
#
# secret.yaml is gitignored — NEVER commit it.
#
# stringData: kubectl base64-encodes values automatically on apply.
# Do NOT manually base64-encode values here.
#
# Generate secrets:
#   JWT_SECRET / ENCRYPTION_KEY / INTERNAL_SECRET:  openssl rand -hex 32
#   DOABLE_KEK:                                      openssl rand -base64 32
#   POSTGRES_PASSWORD:                               openssl rand -hex 16
#   INSTALL_BOOTSTRAP_TOKEN:                         openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: doable-secrets
  namespace: doable
type: Opaque
stringData:
  # ── Core secrets (required) ──────────────────────────────────────────────
  JWT_SECRET: ""
  ENCRYPTION_KEY: ""
  INTERNAL_SECRET: ""
  # WARNING: Never rotate DOABLE_KEK after first deploy — rolling it means
  # data loss for every credential saved via the setup wizard.
  DOABLE_KEK: ""
  POSTGRES_PASSWORD: ""

  # Replace <password> below with the same value as POSTGRES_PASSWORD above
  DATABASE_URL: "postgres://doable:<password>@postgres:5432/doable"

  # ── Bootstrap (optional) ─────────────────────────────────────────────────
  INSTALL_BOOTSTRAP_TOKEN: ""
  INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT: ""

  # ── AI provider keys (set at least one; leave others empty) ──────────────
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  OPENROUTER_API_KEY: ""
  TOGETHER_API_KEY: ""
  FIREWORKS_API_KEY: ""
  OPENCODE_ZEN_API_KEY: ""
  GROQ_API_KEY: ""
  CEREBRAS_API_KEY: ""
  DEEPSEEK_API_KEY: ""
  MISTRAL_API_KEY: ""
  COHERE_API_KEY: ""
  XAI_API_KEY: ""
  PERPLEXITY_API_KEY: ""
  DEEPINFRA_API_KEY: ""
  NVIDIA_API_KEY: ""
  MINIMAX_API_KEY: ""
  MOONSHOT_API_KEY: ""
  ZHIPU_API_KEY: ""

  # ── Optional integrations (wizard can fill at runtime) ───────────────────
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
