apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ws-projects
  namespace: doable
spec:
  accessModes:
    # ReadWriteOnce is correct for single-replica ws.
    # Scale beyond 1 replica requires sticky sessions AND ReadWriteMany storage.
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
