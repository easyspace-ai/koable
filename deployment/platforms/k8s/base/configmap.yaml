apiVersion: v1
kind: ConfigMap
metadata:
  name: doable-config
  namespace: doable
data:
  # ── Public URLs (replace app.example.com with your actual domain) ────────
  NEXT_PUBLIC_API_URL: "https://app.example.com/api"
  NEXT_PUBLIC_WS_URL: "wss://app.example.com/ws"
  NEXT_PUBLIC_APP_URL: "https://app.example.com"
  CORS_ORIGINS: "https://app.example.com"

  # ── API server ────────────────────────────────────────────────────────────
  API_PORT: "4000"
  API_HOST: "0.0.0.0"

  # ── WS server ─────────────────────────────────────────────────────────────
  WS_PORT: "4001"
  WS_HOST: "0.0.0.0"

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  PORT: "3000"
  HOSTNAME: "0.0.0.0"

  # ── Shared ────────────────────────────────────────────────────────────────
  NODE_ENV: "production"

  # ── Internal service-to-service URLs (cluster DNS) ───────────────────────
  API_URL: "http://api:4000"
  WS_INTERNAL_URL: "http://ws:4001"
