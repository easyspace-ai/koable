<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Table Inspector</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body>
  <span id="back" class="back-link">← All tables</span>

  <script src="shared/host-bridge.js" type="module"></script>
  <script src="table-inspector.js" type="module"></script>
